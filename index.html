<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SomVandaag - Rekenoefeningen</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="app.js"></script>
</head>
<body>
    <div class="container" x-data="rekenApp()">
        <header>
            <h1>🧮 SomVandaag</h1>
            <p>Oefen je rekenen!</p>
        </header>

        <div class="card">
            <!-- Hoofdmenu -->
            <template x-if="screen === 'home'">
                <div x-transition:enter="transition ease-out duration-300"
                     x-transition:enter-start="opacity-0 transform scale-95"
                     x-transition:enter-end="opacity-100 transform scale-100"
                     x-transition:leave="transition ease-in duration-200"
                     x-transition:leave-start="opacity-100 transform scale-100"
                     x-transition:leave-end="opacity-0 transform scale-95">
                    
                    <!-- Difficulty Filter Tabs -->
                    <div class="difficulty-tabs">
                        <button class="tab-btn" 
                                :class="{ 'active': difficultyFilter === 'all' }"
                                @click="setDifficultyFilter('all')">
                            Alles
                        </button>
                        <button class="tab-btn" 
                                :class="{ 'active': difficultyFilter === 'basis' }"
                                @click="setDifficultyFilter('basis')">
                            Basis
                        </button>
                        <button class="tab-btn" 
                                :class="{ 'active': difficultyFilter === 'moeilijk' }"
                                @click="setDifficultyFilter('moeilijk')">
                            Moeilijk
                        </button>
                    </div>

                    <!-- Dynamic Grid -->
                    <div class="grid">
                        <template x-for="(category, key) in getFilteredCategories()" :key="key">
                            <button class="grid-item" 
                                    :class="key" 
                                    @click="selectCategory(key)">
                                <div class="icon" x-text="category.subcategories[0]?.icon || '📚'"></div>
                                <div x-text="category.title"></div>
                            </button>
                        </template>
                    </div>
                    
                    <div class="history-btn">
                        <button class="btn-secondary" @click="goToHistory()">📊 Bekijk geschiedenis</button>
                    </div>
                </div>
            </template>

            <!-- Subcategorie selectie -->
            <template x-if="screen === 'subcategory'">
                <div x-transition:enter="transition ease-out duration-300"
                     x-transition:enter-start="opacity-0 transform scale-95"
                     x-transition:enter-end="opacity-100 transform scale-100"
                     x-transition:leave="transition ease-in duration-200"
                     x-transition:leave-start="opacity-100 transform scale-100"
                     x-transition:leave-end="opacity-0 transform scale-95">
                    <button class="back-btn" @click="goHome()">← Terug</button>
                    <h2 class="section-title" x-text="getCategoryTitle()"></h2>
                    <div class="grid">
                        <template x-for="sub in getSubcategories()" :key="sub.id">
                            <button class="grid-item" 
                                    :class="currentCategory" 
                                    @click="startQuiz(sub)">
                                <div class="icon" x-text="sub.icon"></div>
                                <div x-text="sub.name"></div>
                            </button>
                        </template>
                    </div>
                </div>
            </template>

            <!-- Quiz -->
            <template x-if="screen === 'quiz'">
                <div class="quiz-container"
                     x-transition:enter="transition ease-out duration-300"
                     x-transition:enter-start="opacity-0 transform scale-95"
                     x-transition:enter-end="opacity-100 transform scale-100"
                     x-transition:leave="transition ease-in duration-200"
                     x-transition:leave-start="opacity-100 transform scale-100"
                     x-transition:leave-end="opacity-0 transform scale-95">
                    <button class="back-btn" @click="goToSubcategory()">← Stoppen</button>
                    
                    <div class="progress-text">
                        Vraag <span x-text="currentQuestionIndex + 1"></span> van <span x-text="questions.length"></span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" :style="'width: ' + ((currentQuestionIndex + 1) / questions.length * 100) + '%'"></div>
                    </div>

                    <div class="question" x-text="getCurrentQuestion()"></div>

                    <!-- SVG Analog Clock for clock reading exercises -->
                    <template x-if="questions[currentQuestionIndex]?.type?.startsWith('clock_')">
                        <div class="clock-container">
                            <!-- Day/Night Indicator -->
                            <div class="time-indicator">
                                <span x-show="questions[currentQuestionIndex].isPM === false" class="moon-icon">🌙 Nacht/Ochtend (0:00 - 11:59)</span>
                                <span x-show="questions[currentQuestionIndex].isPM === true" class="sun-icon">☀️ Middag/Avond (12:00 - 23:59)</span>
                            </div>
                            
                            <svg class="analog-clock" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                                <!-- Clock face -->
                                <circle cx="100" cy="100" r="95" fill="white" stroke="#333" stroke-width="3"/>
                                
                                <!-- Hour markers (12 thick lines) -->
                                <line x1="100" y1="10" x2="100" y2="20" stroke="#333" stroke-width="3"/>
                                <line x1="150" y1="25" x2="145" y2="33" stroke="#333" stroke-width="3"/>
                                <line x1="175" y1="50" x2="167" y2="55" stroke="#333" stroke-width="3"/>
                                <line x1="190" y1="100" x2="180" y2="100" stroke="#333" stroke-width="3"/>
                                <line x1="175" y1="150" x2="167" y2="145" stroke="#333" stroke-width="3"/>
                                <line x1="150" y1="175" x2="145" y2="167" stroke="#333" stroke-width="3"/>
                                <line x1="100" y1="190" x2="100" y2="180" stroke="#333" stroke-width="3"/>
                                <line x1="50" y1="175" x2="55" y2="167" stroke="#333" stroke-width="3"/>
                                <line x1="25" y1="150" x2="33" y2="145" stroke="#333" stroke-width="3"/>
                                <line x1="10" y1="100" x2="20" y2="100" stroke="#333" stroke-width="3"/>
                                <line x1="25" y1="50" x2="33" y2="55" stroke="#333" stroke-width="3"/>
                                <line x1="50" y1="25" x2="55" y2="33" stroke="#333" stroke-width="3"/>
                                
                                <!-- Minute markers (48 thin lines between hour markers) -->
                                <line x1="109.6" y1="11.3" x2="109.6" y2="16.3" stroke="#999" stroke-width="1"/>
                                <line x1="119" y1="13" x2="119" y2="18" stroke="#999" stroke-width="1"/>
                                <line x1="128" y1="15.5" x2="128" y2="20.5" stroke="#999" stroke-width="1"/>
                                <line x1="136.5" y1="19" x2="136.5" y2="24" stroke="#999" stroke-width="1"/>
                                <line x1="154.5" y1="28.5" x2="151" y2="32.5" stroke="#999" stroke-width="1"/>
                                <line x1="162" y1="34" x2="158.5" y2="38" stroke="#999" stroke-width="1"/>
                                <line x1="168.5" y1="40.5" x2="165" y2="44.5" stroke="#999" stroke-width="1"/>
                                <line x1="177" y1="54.5" x2="172" y2="58.5" stroke="#999" stroke-width="1"/>
                                <line x1="181" y1="62.5" x2="176" y2="66.5" stroke="#999" stroke-width="1"/>
                                <line x1="184.5" y1="71" x2="179.5" y2="75" stroke="#999" stroke-width="1"/>
                                <line x1="187" y1="80" x2="182" y2="84" stroke="#999" stroke-width="1"/>
                                <line x1="188.7" y1="89.6" x2="183.7" y2="89.6" stroke="#999" stroke-width="1"/>
                                <line x1="188.7" y1="110.4" x2="183.7" y2="110.4" stroke="#999" stroke-width="1"/>
                                <line x1="187" y1="120" x2="182" y2="116" stroke="#999" stroke-width="1"/>
                                <line x1="184.5" y1="129" x2="179.5" y2="125" stroke="#999" stroke-width="1"/>
                                <line x1="181" y1="137.5" x2="176" y2="133.5" stroke="#999" stroke-width="1"/>
                                <line x1="177" y1="145.5" x2="172" y2="141.5" stroke="#999" stroke-width="1"/>
                                <line x1="168.5" y1="159.5" x2="165" y2="155.5" stroke="#999" stroke-width="1"/>
                                <line x1="162" y1="166" x2="158.5" y2="162" stroke="#999" stroke-width="1"/>
                                <line x1="154.5" y1="171.5" x2="151" y2="167.5" stroke="#999" stroke-width="1"/>
                                <line x1="136.5" y1="181" x2="136.5" y2="176" stroke="#999" stroke-width="1"/>
                                <line x1="128" y1="184.5" x2="128" y2="179.5" stroke="#999" stroke-width="1"/>
                                <line x1="119" y1="187" x2="119" y2="182" stroke="#999" stroke-width="1"/>
                                <line x1="109.6" y1="188.7" x2="109.6" y2="183.7" stroke="#999" stroke-width="1"/>
                                <line x1="90.4" y1="188.7" x2="90.4" y2="183.7" stroke="#999" stroke-width="1"/>
                                <line x1="81" y1="187" x2="81" y2="182" stroke="#999" stroke-width="1"/>
                                <line x1="72" y1="184.5" x2="72" y2="179.5" stroke="#999" stroke-width="1"/>
                                <line x1="63.5" y1="181" x2="63.5" y2="176" stroke="#999" stroke-width="1"/>
                                <line x1="45.5" y1="171.5" x2="49" y2="167.5" stroke="#999" stroke-width="1"/>
                                <line x1="38" y1="166" x2="41.5" y2="162" stroke="#999" stroke-width="1"/>
                                <line x1="31.5" y1="159.5" x2="35" y2="155.5" stroke="#999" stroke-width="1"/>
                                <line x1="23" y1="145.5" x2="28" y2="141.5" stroke="#999" stroke-width="1"/>
                                <line x1="19" y1="137.5" x2="24" y2="133.5" stroke="#999" stroke-width="1"/>
                                <line x1="15.5" y1="129" x2="20.5" y2="125" stroke="#999" stroke-width="1"/>
                                <line x1="13" y1="120" x2="18" y2="116" stroke="#999" stroke-width="1"/>
                                <line x1="11.3" y1="110.4" x2="16.3" y2="110.4" stroke="#999" stroke-width="1"/>
                                <line x1="11.3" y1="89.6" x2="16.3" y2="89.6" stroke="#999" stroke-width="1"/>
                                <line x1="13" y1="80" x2="18" y2="84" stroke="#999" stroke-width="1"/>
                                <line x1="15.5" y1="71" x2="20.5" y2="75" stroke="#999" stroke-width="1"/>
                                <line x1="19" y1="62.5" x2="24" y2="66.5" stroke="#999" stroke-width="1"/>
                                <line x1="23" y1="54.5" x2="28" y2="58.5" stroke="#999" stroke-width="1"/>
                                <line x1="31.5" y1="40.5" x2="35" y2="44.5" stroke="#999" stroke-width="1"/>
                                <line x1="38" y1="34" x2="41.5" y2="38" stroke="#999" stroke-width="1"/>
                                <line x1="45.5" y1="28.5" x2="49" y2="32.5" stroke="#999" stroke-width="1"/>
                                <line x1="63.5" y1="19" x2="63.5" y2="24" stroke="#999" stroke-width="1"/>
                                <line x1="72" y1="15.5" x2="72" y2="20.5" stroke="#999" stroke-width="1"/>
                                <line x1="81" y1="13" x2="81" y2="18" stroke="#999" stroke-width="1"/>
                                <line x1="90.4" y1="11.3" x2="90.4" y2="16.3" stroke="#999" stroke-width="1"/>
                                
                                <!-- Hour hand -->
                                <line x1="100" y1="100"
                                      :x2="100 + 50 * Math.sin((questions[currentQuestionIndex].a * 30 + questions[currentQuestionIndex].b * 0.5) * Math.PI / 180)"
                                      :y2="100 - 50 * Math.cos((questions[currentQuestionIndex].a * 30 + questions[currentQuestionIndex].b * 0.5) * Math.PI / 180)"
                                      stroke="#333" stroke-width="6" stroke-linecap="round"/>
                                
                                <!-- Minute hand -->
                                <line x1="100" y1="100"
                                      :x2="100 + 70 * Math.sin(questions[currentQuestionIndex].b * 6 * Math.PI / 180)"
                                      :y2="100 - 70 * Math.cos(questions[currentQuestionIndex].b * 6 * Math.PI / 180)"
                                      stroke="#666" stroke-width="4" stroke-linecap="round"/>
                                
                                <!-- Center dot -->
                                <circle cx="100" cy="100" r="5" fill="#333"/>
                            </svg>
                        </div>
                    </template>

                    <input :type="questions[currentQuestionIndex]?.type?.startsWith('clock_') ? 'text' : 'number'" 
                           step="0.1"
                           class="answer-input" 
                           :class="{ 'correct': showFeedback && isCorrect, 'incorrect': showFeedback && !isCorrect }"
                           x-model="userAnswer"
                           @keyup.enter="checkAnswer()"
                           :disabled="showFeedback"
                           x-ref="answerInput"
                           :placeholder="questions[currentQuestionIndex]?.type?.startsWith('clock_') ? '00:00' : '?'">

                    <div>
                        <button class="submit-btn" 
                                @click="checkAnswer()" 
                                :disabled="userAnswer === '' || showFeedback"
                                x-show="!showFeedback">
                            Controleer
                        </button>
                        <button class="submit-btn" 
                                @click="nextQuestion()" 
                                x-show="showFeedback">
                            <span x-text="currentQuestionIndex < questions.length - 1 ? 'Volgende →' : 'Bekijk resultaat'"></span>
                        </button>
                    </div>

                    <div class="feedback" 
                         :class="{ 'correct': isCorrect, 'incorrect': !isCorrect }"
                         x-show="showFeedback"
                         x-transition:enter="transition ease-out duration-200"
                         x-transition:enter-start="opacity-0 transform translate-y-2"
                         x-transition:enter-end="opacity-100 transform translate-y-0">
                        <template x-if="isCorrect">
                            <span>✅ Goed zo!</span>
                        </template>
                        <template x-if="!isCorrect">
                            <span>❌ Helaas! Het antwoord was <span x-text="questions[currentQuestionIndex].answer"></span></span>
                        </template>
                    </div>
                </div>
            </template>

            <!-- Geschiedenis -->
            <template x-if="screen === 'history'">
                <div x-transition:enter="transition ease-out duration-300"
                     x-transition:enter-start="opacity-0 transform scale-95"
                     x-transition:enter-end="opacity-100 transform scale-100"
                     x-transition:leave="transition ease-in duration-200"
                     x-transition:leave-start="opacity-100 transform scale-100"
                     x-transition:leave-end="opacity-0 transform scale-95">
                    <button class="back-btn" @click="goHome()">← Terug</button>
                    <h2 class="section-title">Geschiedenis</h2>
                    
                    <template x-if="historyItems.length === 0">
                        <div class="empty-history">
                            <div class="emoji">📚</div>
                            <p>Nog geen resultaten. Begin met oefenen!</p>
                        </div>
                    </template>

                    <template x-if="historyItems.length > 0">
                        <div class="history-list">
                            <template x-for="(item, index) in historyItems" :key="index">
                                <div class="history-item">
                                    <div class="history-info">
                                        <div class="history-title" x-text="getHistoryTitle(item)"></div>
                                        <div class="history-date" x-text="formatDate(item.date)"></div>
                                    </div>
                                    <div class="history-score">
                                        <span class="score-correct" x-text="item.score + ' goed'"></span>
                                        <span class="score-separator">-</span>
                                        <span class="score-wrong" x-text="(item.total - item.score) + ' fout'"></span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Resultaten -->
            <template x-if="screen === 'results'">
                <div class="results"
                     x-transition:enter="transition ease-out duration-300"
                     x-transition:enter-start="opacity-0 transform scale-95"
                     x-transition:enter-end="opacity-100 transform scale-100"
                     x-transition:leave="transition ease-in duration-200"
                     x-transition:leave-start="opacity-100 transform scale-100"
                     x-transition:leave-end="opacity-0 transform scale-95">
                    <div class="emoji" x-text="getResultEmoji()"></div>
                    <div class="results-score">
                        <span x-text="score"></span> / <span x-text="questions.length"></span>
                    </div>
                    <div class="results-message" x-text="getResultMessage()"></div>

                    <div class="btn-group">
                        <button class="btn-primary" @click="restartQuiz()">🔄 Opnieuw</button>
                        <button class="btn-secondary" @click="goToSubcategory()">📚 Andere oefening</button>
                        <button class="btn-secondary" @click="goHome()">🏠 Hoofdmenu</button>
                    </div>
                    
                    <div class="results-details">
                        <template x-for="(q, index) in questions" :key="index">
                            <div class="result-item" :class="{ 'correct': q.userAnswer == q.answer, 'incorrect': q.userAnswer != q.answer }">
                                <span x-text="q.questionText"></span>
                                <span>
                                    <span x-text="q.userAnswer"></span>
                                    <span x-show="q.userAnswer != q.answer"> (was: <span x-text="q.answer"></span>)</span>
                                    <span x-text="q.userAnswer == q.answer ? '✅' : '❌'"></span>
                                </span>
                            </div>
                        </template>
                    </div>


                </div>
            </template>
        </div>
    </div>
</body>
</html>
